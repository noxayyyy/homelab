global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'caddy'
    static_configs:
      - targets: ['host.docker.internal:2019']

  - job_name: 'jellyfin'
    metrics_path: /metrics
    static_configs:
      - targets: ['jellyfin:9594']

  - job_name: 'qbittorrent'
    static_configs:
      - targets: ['qbittorrent:17871']

  - job_name: 'snikket'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5280']
