services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: "no"
    volumes:
      - /etc/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /srv/monitoring/prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:${NODE_NET_GW}"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=14d'
    networks:
      - node-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: "no"
    ports:
      - "127.0.0.1:3003:3000"
    volumes:
      - /srv/monitoring/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_PASS}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - node-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: "no"
    volumes:
      # It needs read-only access to your host OS to see hardware stats
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /srv/monitoring/textfiles:/textfiles:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/textfiles'
    networks:
      - node-net

  cadvisor:
    image: ghcr.io/google/cadvisor:latest
    container_name: cadvisor
    restart: "no"
    privileged: true
    volumes:
      # Needs access to Docker socket to see container RAM/CPU usage
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - node-net

  qbittorrent:
    image: caseyscarborough/qbittorrent-exporter:latest
    container_name: qbittorrent-exporter
    restart: "no"
    environment:
      - QBITTORRENT_BASE_URL=http://host.docker.internal:8081
      - QBITTORRENT_USERNAME=${QB_USER}
      - QBITTORRENT_PASSWORD=${QB_PASS}
    extra_hosts:
      - "host.docker.internal:${NODE_NET_GW}"
    networks:
      - node-net

  jellyfin:
    image: rebelcore/jellyfin-exporter:latest
    container_name: jellyfin-exporter
    restart: "no"
    command:
      - '--jellyfin.address=http://host.docker.internal:8097'
      - '--jellyfin.token=${JF_TOKEN}'
      - '--collector.activity'
    extra_hosts:
      - "host.docker.internal:${NODE_NET_GW}"
    networks:
      - node-net

networks:
  node-net:
    external: true
